name: Update Pinned Skills Registry

on:
  push:
    branches:
      - main
    paths:
      - skills/**
      - meta.ts
      - README.md
      - vendor/**
      - sources/**
      - scripts/**
      - package.json
      - .github/workflows/update-pinned-registry.yml
  workflow_dispatch:
    inputs:
      issue_number:
        description: Pinned issue 编号，留空时使用仓库变量 PINNED_ISSUE_NUMBER
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pinned-skills-registry
  cancel-in-progress: true

jobs:
  update-registry:
    runs-on: ubuntu-latest
    env:
      ISSUE_NUMBER: ${{ github.event.inputs.issue_number || vars.PINNED_ISSUE_NUMBER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate issue number
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "未配置 PINNED_ISSUE_NUMBER，且未在 workflow_dispatch 中传入 issue_number。"
            exit 1
          fi

      - name: Build registry markdown
        env:
          REGISTRY_FILE: ${{ runner.temp }}/skills-registry.md
        run: |
          pnpm registry:build -- --base "${{ github.event.before }}" --head "${{ github.sha }}" --output "$REGISTRY_FILE"

      - name: Update pinned issue body
        env:
          GH_TOKEN: ${{ github.token }}
          REGISTRY_FILE: ${{ runner.temp }}/skills-registry.md
        run: gh issue edit "$ISSUE_NUMBER" --body-file "$REGISTRY_FILE"
