name: Update Pinned Skills Registry

on:
  push:
    branches:
      - main
    paths:
      - skills/**
      - meta.ts
      - README.md
      - vendor/**
      - sources/**
      - scripts/**
      - package.json
      - .github/workflows/update-pinned-registry.yml
  workflow_dispatch:
    inputs:
      my_skill_issue_number:
        description: 自定义 Skills issue 编号，留空时使用 Secrets.MY_SKILL_ISSUE_NUMBER
        required: false
        type: string
      other_skill_issue_number:
        description: 外部 Skills issue 编号，留空时使用 Secrets.OTHER_SKILL_ISSUE_NUMBER
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pinned-skills-registry
  cancel-in-progress: true

jobs:
  update-registry:
    runs-on: ubuntu-latest
    env:
      MY_SKILL_ISSUE: ${{ github.event.inputs.my_skill_issue_number || secrets.MY_SKILL_ISSUE_NUMBER }}
      OTHER_SKILL_ISSUE: ${{ github.event.inputs.other_skill_issue_number || secrets.OTHER_SKILL_ISSUE_NUMBER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate issue numbers
        run: |
          if [ -z "$MY_SKILL_ISSUE" ] && [ -z "$OTHER_SKILL_ISSUE" ]; then
            echo "至少需要配置一个 issue 编号（MY_SKILL_ISSUE_NUMBER 或 OTHER_SKILL_ISSUE_NUMBER）。"
            exit 1
          fi

      - name: Build registry markdown
        env:
          MY_SKILL_FILE: ${{ runner.temp }}/my-skills-registry.md
          OTHER_SKILL_FILE: ${{ runner.temp }}/other-skills-registry.md
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
        run: |
          pnpm registry:build -- \
            --base "${{ github.event.before }}" \
            --head "${{ github.sha }}" \
            --output-my "$MY_SKILL_FILE" \
            --output-other "$OTHER_SKILL_FILE" \
            --summarize

      - name: Update my skills issue
        if: env.MY_SKILL_ISSUE != ''
        env:
          GH_TOKEN: ${{ github.token }}
          MY_SKILL_FILE: ${{ runner.temp }}/my-skills-registry.md
        run: gh issue edit "$MY_SKILL_ISSUE" --body-file "$MY_SKILL_FILE"

      - name: Update other skills issue
        if: env.OTHER_SKILL_ISSUE != ''
        env:
          GH_TOKEN: ${{ github.token }}
          OTHER_SKILL_FILE: ${{ runner.temp }}/other-skills-registry.md
        run: gh issue edit "$OTHER_SKILL_ISSUE" --body-file "$OTHER_SKILL_FILE"
