name: Update Pinned Skills Registry

on:
  push:
    branches:
      - main
    paths:
      - .preview/**
      - .github/workflows/update-pinned-registry.yml
  workflow_dispatch:
    inputs:
      my_skill_issue_number:
        description: 自定义 Skills issue 编号，留空时使用 Secrets.MY_SKILL_ISSUE_NUMBER
        required: false
        type: string
      other_skill_issue_number:
        description: 外部 Skills issue 编号，留空时使用 Secrets.OTHER_SKILL_ISSUE_NUMBER
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: pinned-skills-registry
  cancel-in-progress: true

jobs:
  update-registry:
    runs-on: ubuntu-latest
    env:
      MY_SKILL_ISSUE: ${{ github.event.inputs.my_skill_issue_number || secrets.MY_SKILL_ISSUE_NUMBER }}
      OTHER_SKILL_ISSUE: ${{ github.event.inputs.other_skill_issue_number || secrets.OTHER_SKILL_ISSUE_NUMBER }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate issue numbers
        run: |
          if [ -z "$MY_SKILL_ISSUE" ] && [ -z "$OTHER_SKILL_ISSUE" ]; then
            echo "至少需要配置一个 issue 编号（MY_SKILL_ISSUE_NUMBER 或 OTHER_SKILL_ISSUE_NUMBER）。"
            exit 1
          fi

      - name: Update my skills issue
        if: env.MY_SKILL_ISSUE != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit "$MY_SKILL_ISSUE" --body-file .preview/my-skills-registry.md

      - name: Update other skills issue
        if: env.OTHER_SKILL_ISSUE != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue edit "$OTHER_SKILL_ISSUE" --body-file .preview/other-skills-registry.md
